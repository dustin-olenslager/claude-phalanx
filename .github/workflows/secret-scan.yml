name: secret-scan
# Server-side backstop: scans every push and PR for secrets with gitleaks.
# The local pre-push hook is the primary guard (blocks before anything leaves
# the machine); this catches anything pushed from an un-guarded clone.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action requires GITHUB_TOKEN to scan pull_request events.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
